services:
  - type: web
    name: friend-zone-backend
    runtime: node
    buildCommand: bash build.sh
    startCommand: bash start.sh
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
